<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PWA Demo App</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#4CAF50">
    
    <script>
        // Регистрация Service Worker
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register('./serviceWorker.js');
        }

        // 👇 Код для показа кнопки установки
        let deferredPrompt;
        const installBtn = document.createElement('button');
        installBtn.textContent = '📱 Установить приложение';
        installBtn.style.display = 'none';
        installBtn.style.position = 'fixed';
        installBtn.style.bottom = '20px';
        installBtn.style.left = '50%';
        installBtn.style.transform = 'translateX(-50%)';
        installBtn.style.padding = '15px 30px';
        installBtn.style.fontSize = '18px';
        installBtn.style.background = '#4CAF50';
        installBtn.style.color = 'white';
        installBtn.style.border = 'none';
        installBtn.style.borderRadius = '30px';
        installBtn.style.boxShadow = '0 4px 15px rgba(0,0,0,0.3)';
        installBtn.style.zIndex = '1000';
        installBtn.style.cursor = 'pointer';
        document.body.appendChild(installBtn);

        // Слушаем событие beforeinstallprompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        // Обработчик клика по кнопке
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                if (result.outcome === 'accepted') {
                    console.log('Пользователь установил приложение');
                    installBtn.style.display = 'none';
                } else {
                    console.log('Пользователь отказался');
                }
                deferredPrompt = null;
            }
        });

        // Скрываем кнопку, если приложение уже установлено
        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
            console.log('Приложение установлено!');
        });
    </script>
</head>
<body>
    <h1>Hello world</h1>
    <p>Это PWA приложение. Нажмите "Установить" внизу!</p>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #f5f5f5;
            margin: 0;
        }
        h1 {
            color: #4CAF50;
            margin-top: 40px;
        }
        p {
            color: #333;
            font-size: 18px;
        }
    </style>
</body>
</html>
